<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Appointment Form</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/bookappointment.css') }}"
    />

    <!-- SweetAlert -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  </head>

  <body>
    <header>
      <a href="#" class="logo">Cars-Bay</a>
      <ul class="navbar">
        <li><a href="{{ url_for('home') }}">Home</a></li>
        <li><a href="{{ url_for('show_login') }}">Login</a></li>
        <li><a href="{{ url_for('about') }}">About</a></li>
        <li><a href="{{ url_for('contactUs') }}">Contact & Support</a></li>
        <li><a href="{{ url_for('dashboard') }}">Profile</a></li>
      </ul>
    </header>

    <div class="formbold-main-wrapper">
      <div class="formbold-form-wrapper">
        <form action="{{ url_for('book_appointment_page') }}" method="POST">
          <!-- Full Name -->
          <div class="formbold-mb-5">
            <label class="formbold-form-label">Full Name</label>
            <input
              type="text"
              name="name"
              class="formbold-form-input"
              required
            />
          </div>

          <!-- Phone -->
          <div class="formbold-mb-5">
            <label class="formbold-form-label">Phone Number</label>
            <input
              type="text"
              name="phone"
              class="formbold-form-input"
              required
            />
          </div>

          <!-- Vehicle -->
          <div class="formbold-mb-5">
            <label class="formbold-form-label">Preferred Vehicle Model</label>
            <select name="vehicle" class="formbold-form-input" required>
              <option value="" disabled selected>
                Select your preferred car
              </option>
              <option value="Aprillia RSV4">Aprillia RSV4</option>
              <option value="BMW S1000RR">BMW S1000RR</option>
              <option value="Apache RR310">Apache RR310</option>
              <option value="Yamaha MT-07">Yamaha MT-07</option>
              <option value="Ducati 916">Ducati 916</option>
              <option value="KTM RC.8e">KTM RC.8e</option>
              <option value="Kawasaki">Kawasaki</option>
              <option value="Hayabusa">Hayabusa</option>
              <option value="Benelli">Benelli</option>
              <option value="Royal Enfield Himalayan">
                Royal Enfield Himalayan
              </option>
              <option value="Triumph">Triumph</option>
              <option value="KTM 390 Adventure">KTM 390 Adventure</option>
            </select>
          </div>

          <!-- Date & Time -->
          <div class="flex formbold--mx-3">
            <div class="w-full sm:w-half formbold-px-3">
              <div class="formbold-mb-5">
                <label class="formbold-form-label">Date</label>
                <input
                  type="date"
                  name="date"
                  id="date"
                  class="formbold-form-input"
                  required
                />
              </div>
            </div>

            <div class="w-full sm:w-half formbold-px-3">
              <div class="formbold-mb-5">
                <label class="formbold-form-label">Time</label>
                <input
                  type="time"
                  name="time"
                  id="time"
                  class="formbold-form-input"
                  required
                />
              </div>
            </div>
          </div>

          <!-- Address -->
          <div class="formbold-mb-5 formbold-pt-3">
            <label class="formbold-form-label">Address Details</label>
            <div class="flex formbold--mx-3">
              <div class="w-full sm:w-half formbold-px-3">
                <input
                  type="text"
                  name="area"
                  placeholder="Enter area"
                  class="formbold-form-input"
                  required
                />
              </div>

              <div class="w-full sm:w-half formbold-px-3">
                <input
                  type="text"
                  name="city"
                  placeholder="Enter city"
                  class="formbold-form-input"
                  required
                />
              </div>

              <div class="w-full sm:w-half formbold-px-3">
                <input
                  type="text"
                  name="state"
                  placeholder="Enter state"
                  class="formbold-form-input"
                  required
                />
              </div>

              <div class="w-full sm:w-half formbold-px-3">
                <input
                  type="text"
                  name="post_code"
                  placeholder="Post Code"
                  class="formbold-form-input"
                  required
                />
              </div>
            </div>
          </div>

          <!-- Driving License -->
          <div class="formbold-mb-5">
            <label class="formbold-form-label"
              >Do you have a Driving License?</label
            >
            <div class="formbold-radio-group">
              <label>
                <input
                  type="radio"
                  name="driving_license"
                  value="Yes"
                  onclick="toggleLicenseNumber(true)"
                  required
                />
                Yes
              </label>
              <label>
                <input
                  type="radio"
                  name="driving_license"
                  value="No"
                  onclick="toggleLicenseNumber(false)"
                  required
                />
                No
              </label>
            </div>
          </div>

          <div
            class="formbold-mb-5"
            id="license-number-field"
            style="display: none"
          >
            <label class="formbold-form-label">Driving License Number</label>
            <input
              type="text"
              name="license_number"
              class="formbold-form-input"
            />
          </div>

          <button class="formbold-btn">Book Appointment</button>
        </form>
      </div>
    </div>

    <!-- Separated JS File -->
    <script src="{{ url_for('static', filename='js/appoint.js') }}"></script>

    <!-- Flask / SweetAlert Flash -->
    {% with messages = get_flashed_messages(with_categories=true) %} {% if
    messages %}
    <script>
      {% for category, message in messages %}
        Swal.fire({
          icon: "{{ 'error' if category == 'danger' else 'success' }}",
          title: "{{ message }}",
          timer: 2000,
          showConfirmButton: false
        });
      {% endfor %}
    </script>
    {% endif %} {% endwith %}
  </body>
</html>
